<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}量化策略控制面板{% endblock %}</title>
  <style>
    :root {
      --bg: #f9f9f9;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #0f766e;
      --brand-2: #d97706;
      --danger: #b91c1c;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.6;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }
    .hero {
      margin-bottom: 20px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .hero p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .nav a {
      text-decoration: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      color: var(--ink);
      border: 1px solid var(--line);
      background: white;
      box-shadow: var(--shadow);
    }
    .nav a.active {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn, button {
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      color: white;
      background: var(--brand);
      box-shadow: var(--shadow);
    }
    .btn.secondary, button.secondary { background: var(--brand-2); }
    .btn.danger, button.danger { background: var(--danger); }
    .btn.ghost, button.ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 600;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      gap: 12px;
    }
    .metric:last-child { border-bottom: 0; }
    .metric .label { color: var(--muted); }
    .metric .value { font-weight: 500; text-align: right; }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      background: #9ca3af;
    }
    .status-running { background: #16a34a; }
    .status-stopped { background: #dc2626; }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.5;
      color: #1f2937;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 400px;
      overflow: auto;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .field label {
      font-size: 13px;
      color: var(--muted);
    }
    .field input[type="text"],
    .field input[type="password"],
    .field input[type="number"],
    .field input[type="time"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      background: white;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .flash {
      position: sticky;
      top: 10px;
      z-index: 20;
      margin-bottom: 12px;
      display: none;
      border-radius: 8px;
      padding: 12px 14px;
      background: #1f2937;
      color: white;
    }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="wrap">
    <div id="flash" class="flash"></div>

    <section class="hero">
      <h1>{% block hero_title %}量化策略控制面板{% endblock %}</h1>
      <p>{% block hero_desc %}日志监控与参数调整分离{% endblock %}</p>
    </section>

    <nav class="nav">
      <a href="/logs" class="{% block nav_logs %}{% endblock %}">日志页</a>
      <a href="/config" class="{% block nav_config %}{% endblock %}">配置页</a>
    </nav>

    {% block content %}{% endblock %}
  </div>

  <script>
    function showFlash(message, isError = false) {
      const el = document.getElementById("flash");
      el.style.display = "block";
      el.style.background = isError ? "#b91c1c" : "#1f2937";
      el.textContent = message;
      setTimeout(() => {
        el.style.display = "none";
      }, 3000);
    }

    async function api(url, method = "GET", body = null) {
      const options = { method, headers: {} };
      if (body) {
        options.headers["Content-Type"] = "application/json";
        options.body = JSON.stringify(body);
      }
      const response = await fetch(url, options);
      return await response.json();
    }

    function kvRow(label, value) {
      const text = value === null || value === undefined || value === "" ? "-" : value;
      return `<div class="metric"><div class="label">${label}</div><div class="value">${text}</div></div>`;
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
